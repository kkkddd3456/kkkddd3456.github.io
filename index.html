<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TRON DApp 前端示例</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
</head>
<body>
    <h1>TRON DApp 前端示例</h1>
    <button id="connectBtn">连接钱包</button>
    <p>用户地址: <span id="userAddress">未连接</span></p>
    <button id="bindBtn">绑定用户</button>
    <p id="status"></p>

    <script>
        const contractAddress = 'TRZvddUZXAoriYEdrzVdMjcpF6VVVwQAis';
        const usdtAddress = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const contractABI = [
            {
                "inputs": [],
                "stateMutability": "nonpayable",
                "type": "constructor"
            },
            {
                "anonymous": false,
                "inputs": [
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "user",
                        "type": "address"
                    }
                ],
                "name": "Bound",
                "type": "event"
            },
            {
                "anonymous": false,
                "inputs": [
                    {
                        "indexed": true,
                        "internalType": "address",
                        "name": "user",
                        "type": "address"
                    },
                    {
                        "indexed": false,
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "Deducted",
                "type": "event"
            },
            {
                "inputs": [],
                "name": "USDT",
                "outputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "bind",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "user",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "deduct",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "getContractBalance",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "user",
                        "type": "address"
                    }
                ],
                "name": "getUserBalance",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    }
                ],
                "name": "isBound",
                "outputs": [
                    {
                        "internalType": "bool",
                        "name": "",
                        "type": "bool"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "owner",
                "outputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            }
        ];

        let tronWebInstance;
        let userAddress;
        let contract;

        // 等待 TronWeb 注入完成并获取合约实例
        async function initTronWeb() {
            // 等待 TronWeb 注入
            while (typeof window.tronWeb === 'undefined' || !window.tronWeb.ready) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            tronWebInstance = window.tronWeb;

            try {
                contract = await tronWebInstance.contract(contractABI).at(contractAddress);
                console.log('合约实例获取成功');
            } catch (err) {
                console.error('合约实例获取失败:', err);
                document.getElementById('status').innerText = '合约初始化失败';
            }
        }

        // 连接钱包按钮
        document.getElementById('connectBtn').addEventListener('click', async () => {
            await initTronWeb();
            userAddress = tronWebInstance.defaultAddress.base58;
            if (!userAddress) {
                document.getElementById('status').innerText = '请授权钱包';
                return;
            }
            document.getElementById('userAddress').innerText = userAddress;
            document.getElementById('status').innerText = '钱包连接成功';
            console.log('用户地址 Base58:', userAddress);
            console.log('用户地址 Hex:', tronWebInstance.address.toHex(userAddress));
        });

        // 绑定用户按钮
        document.getElementById('bindBtn').addEventListener('click', async () => {
            if (!userAddress || !contract) {
                document.getElementById('status').innerText = '请先连接钱包并确保合约实例已加载';
                return;
            }

            try {
                const userHex = tronWebInstance.address.toHex(userAddress);
                console.log('用户地址Hex:', userHex);

                // 调用 bind 方法，使用 methods['bind'] 避免关键字冲突
                const tx = await contract.methods['bind']().send();
                console.log('绑定交易:', tx);
                document.getElementById('status').innerText = '绑定交易已发送，交易ID: ' + tx;
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = '绑定失败: ' + error.message;
            }
        });
    </script>
</body>
</html>
