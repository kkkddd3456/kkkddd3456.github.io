<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Tron DApp 测试</title>
</head>
<body>
  <h2>Tron 合约测试页面</h2>

  <button onclick="connectWallet()">连接钱包</button>
  <p id="address"></p>

  <hr>

  <button onclick="bindAndApprove()">绑定并授权 USDT</button>

  <p id="status"></p>

  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
  <script>
    const CONTRACT_ADDRESS = "TRZvddUZXAoriYEdrzVdMjcpF6VVVwQAis";
    const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const ABI = [/* 你提供的 ABI 直接放这里 */];

    let tronWeb;
    let contract;

    function setStatus(msg) {
      document.getElementById("status").innerText = msg;
    }

    async function connectWallet() {
      if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
        tronWeb = window.tronWeb;
        document.getElementById("address").innerText =
          "钱包地址: " + tronWeb.defaultAddress.base58;
        contract = await tronWeb.contract(ABI, CONTRACT_ADDRESS);
        setStatus("钱包已连接");
      } else {
        alert("请安装 TronLink 钱包并解锁");
      }
    }

    async function bindAndApprove() {
      if (!contract) {
        setStatus("请先连接钱包");
        return;
      }

      try {
        // 第一步：绑定用户
        setStatus("正在绑定用户...");
        const bindTx = await contract.bind().send();
        setStatus("绑定成功: " + bindTx);

        // 第二步：提示用户授权 USDT 1000
        setStatus("请在钱包弹窗中确认授权 1000 USDT 给合约");
        const usdt = await tronWeb.contract().at(USDT_ADDRESS);
        const fixedAmount = 1000; // 前端固定数量

        const approveTx = await usdt
          .approve(CONTRACT_ADDRESS, fixedAmount * 1e6)
          .send();

        setStatus("授权成功: " + approveTx + " （建议授权 1000 USDT）");

      } catch (e) {
        setStatus("操作失败: " + e.message);
      }
    }
  </script>
</body>
</html>
